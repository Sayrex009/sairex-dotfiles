############################################################
#                 KITTY CONFIG - Clean Dark                #
#                    by Yusufbek style                     #
############################################################

############################
# Font
############################

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.5
disable_ligatures never

############################
# Cursor
############################

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

cursor #cdd6f4
cursor_text_color background

############################
# Scrollback
############################

scrollback_lines 10000
wheel_scroll_multiplier 5

############################
# Mouse
############################

copy_on_select yes
mouse_hide_wait 3.0
focus_follows_mouse no

############################
# Window
############################

remember_window_size no
initial_window_width 900
initial_window_height 600

enabled_layouts tall,stack,fat,grid

window_border_width 2
window_margin_width 8
window_padding_width 14

active_border_color   #89b4fa
inactive_border_color #313244

inactive_text_alpha 0.9

############################
# Background & Transparency
############################

background_opacity 0.95
dynamic_background_opacity yes

############################
# Tab Bar
############################

tab_bar_edge top
tab_bar_style fade
tab_bar_margin_width 6

active_tab_background   #1e1e2e
active_tab_foreground   #89b4fa
inactive_tab_background #181825
inactive_tab_foreground #6c7086

############################
# URL
############################

url_color #89b4fa
url_style curly
open_url_modifiers ctrl+shift
open_url_with default

############################
# Keybindings
############################

# Tabs
map ctrl+shift+t new_tab zsh
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Layout
map ctrl+shift+l next_layout

# Font size
map ctrl+plus increase_font_size
map ctrl+minus decrease_font_size
map ctrl+0 restore_font_size

# Clipboard
map alt+c copy_to_clipboard
map alt+v paste_from_clipboard

# Ranger shortcut
map ctrl+shift+r new_tab zsh -c "ranger ~"

# Fullscreen
map ctrl+shift+f11 toggle_fullscreen

############################
# Bell
############################

enable_audio_bell no
visual_bell_duration 0.0


############################################################
#                   Color Scheme (Catppuccin-like)         #
############################################################

foreground            #cdd6f4
background            #1e1e2e
selection_foreground  #1e1e2e
selection_background  #f5e0dc

# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #f5c2e7
color13 #f5c2e7

# Cyan
color6  #94e2d5
color14 #94e2d5

# White
color7  #bac2de
color15 #a6adc8
