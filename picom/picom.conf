# ============================================
# Picom Config для bspwm – плавные анимации,
# стеклянные окна, тени и легкая прозрачность
# ============================================

# Используем GLX для smooth анимации и blur
backend = "glx"
vsync = true

# ============================================
# Fading – анимация появления и исчезновения окон
# ============================================
fading = true
fade-delta = 4              # скорость анимации
fade-in-step = 0.03         # шаг появления
fade-out-step = 0.03        # шаг исчезновения

# ============================================
# Тени – для плавающих окон
# ============================================
shadow = true
shadow-radius = 12
shadow-offset-x = -10
shadow-offset-y = -10
shadow-opacity = 0.35

# Исключения для тени (панели, декстоп)
shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Dock'",
    "class_g = 'plank'",
    "window_type = 'desktop'"
]

# ============================================
# Прозрачность окон
# ============================================
active-opacity = 3.0          # активные окна
inactive-opacity = 0.88       # неактивные окна
frame-opacity = 0.9

# Прозрачность конкретных окон (например, терминалы, браузеры)
opacity-rule = [
    "90:class_g = 'Kitty'",
    "90:class_g = 'URxvt'",
    "90:class_g = 'Google-chrome-stable'"
]

# ============================================
# Blur – размытие под окнами (glassmorphism)
# ============================================
blur-background = true
blur-method = "dual_kawase"
blur-strength = 7

# Исключения для blur
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
]

# ============================================
# Винтайпы – отдельные настройки для tooltip/dock
# ============================================
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.85; };
    dock = { shadow = false; };
}

# ============================================
# Дополнительно – smoothing для плавных движений
# ============================================
corner-radius = 0

